{% extends "base.html" %}
{% load static %}
{% block title %}Editar Perfil{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="eco-card p-4 p-md-5">
        <div class="text-center mb-4">
          <span style="font-size:2.5rem">✏️</span>
          <h2 class="section-title mt-2 mb-1">Editar Perfil</h2>
        </div>
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre</label>
            <input type="text" name="nombre" class="form-control"
                   value="{{ usuario.first_name }}" placeholder="Tu nombre">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Apellido</label>
            <input type="text" name="apellido" class="form-control"
                   value="{{ usuario.last_name }}" placeholder="Tu apellido">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" class="form-control" value="{{ usuario.email }}"
                   disabled style="background:#f8f9fa; color:#6c757d;">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Teléfono</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
              <input type="tel" name="phone" class="form-control"
                     value="{{ usuario.phone|default:'' }}" placeholder="Ej: 999 123 4567">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Foto de perfil</label>
            {% if usuario.avatar %}
              <div class="mb-2">
                <img src="/media/{{ usuario.avatar }}" alt="Avatar actual"
                     style="width:60px;height:60px;border-radius:50%;object-fit:cover;">
                <small class="text-muted ms-2">Foto actual</small>
              </div>
            {% endif %}
            <input type="file" name="avatar" class="form-control" accept="image/*">
          </div>
          <button type="submit" class="btn-eco w-100 py-3" style="font-size:1rem; border-radius:10px;">
            <i class="bi bi-check-lg me-2"></i>Guardar cambios
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'perfil' %}" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Volver al perfil
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
